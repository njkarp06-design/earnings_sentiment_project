name: Deploy to AWS

# Triggers: every push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:   us-east-1
  PROJECT_NAME: esp
  TF_DIR:       infra/terraform

# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user with ECS/ECR/MSK/S3/IAM deploy permissions
#   AWS_SECRET_ACCESS_KEY
#   MONGO_URI               — MongoDB Atlas connection string
#   ANTHROPIC_API_KEY
#   JWT_SECRET
#   FMP_API_KEY             — optional; set to empty string if unused
#   RESEND_API_KEY          — optional; set to enable portfolio email notifications

jobs:
  # ── Job 0: Lint — must pass before anything deploys ──────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python — covers ingestor, scoring-service, correlation-service
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python services
        run: ruff check ingestor/src scoring-service/src correlation-service/src

      # JavaScript — bff
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bff deps
        run: npm ci --prefix bff

      - name: Lint bff
        run: npm run lint --prefix bff

      # Next.js frontend (next lint is built-in)
      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

  # ── Job 1: Provision / update AWS infrastructure ─────────────────────────────
  infra:
    name: Terraform
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      frontend_url:          ${{ steps.tf.outputs.frontend_url }}
      bff_url:               ${{ steps.tf.outputs.bff_url }}
      ecr_registry:          ${{ steps.tf.outputs.ecr_registry }}
      ecs_cluster_arn:       ${{ steps.tf.outputs.ecs_cluster_arn }}
      ecs_cluster_name:      ${{ steps.tf.outputs.ecs_cluster_name }}
      private_subnet_ids:    ${{ steps.tf.outputs.private_subnet_ids }}
      ecs_security_group_id: ${{ steps.tf.outputs.ecs_security_group_id }}

    env:
      TF_VAR_mongo_uri:         ${{ secrets.MONGO_URI }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_jwt_secret:        ${{ secrets.JWT_SECRET }}
      TF_VAR_fmp_api_key:       ${{ secrets.FMP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve tfplan

      - name: Capture outputs
        id: tf
        run: |
          cd ${{ env.TF_DIR }}
          echo "frontend_url=$(terraform output -raw frontend_url)"                       >> $GITHUB_OUTPUT
          echo "bff_url=$(terraform output -raw bff_url)"                                 >> $GITHUB_OUTPUT
          echo "ecr_registry=$(terraform output -raw ecr_registry)"                       >> $GITHUB_OUTPUT
          echo "ecs_cluster_arn=$(terraform output -raw ecs_cluster_arn)"                 >> $GITHUB_OUTPUT
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"               >> $GITHUB_OUTPUT
          echo "ecs_security_group_id=$(terraform output -raw ecs_security_group_id)"     >> $GITHUB_OUTPUT
          # Flatten JSON array to comma-separated string for use in aws CLI
          SUBNETS=$(terraform output -json private_subnet_ids | jq -r 'join(",")')
          echo "private_subnet_ids=$SUBNETS"                                              >> $GITHUB_OUTPUT

  # ── Job 2: Build Docker images and push to ECR ───────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push all service images
        env:
          REGISTRY: ${{ needs.infra.outputs.ecr_registry }}
          BFF_URL:  ${{ needs.infra.outputs.bff_url }}
          P:        ${{ env.PROJECT_NAME }}
        run: |
          docker build -t $REGISTRY/$P/ingestor:latest            ./ingestor
          docker build -t $REGISTRY/$P/scoring-service:latest     ./scoring-service
          docker build -t $REGISTRY/$P/correlation-service:latest ./correlation-service
          docker build -t $REGISTRY/$P/bff:latest                 ./bff

          # NEXT_PUBLIC_API_URL is baked into the Next.js bundle at build time.
          # The BFF ALB URL comes from the infra job output.
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$BFF_URL \
            -t $REGISTRY/$P/frontend:latest \
            ./frontend

          docker push $REGISTRY/$P/ingestor:latest
          docker push $REGISTRY/$P/scoring-service:latest
          docker push $REGISTRY/$P/correlation-service:latest
          docker push $REGISTRY/$P/bff:latest
          docker push $REGISTRY/$P/frontend:latest

  # ── Job 3: Create Kafka topics on MSK (idempotent) ───────────────────────────
  kafka-setup:
    name: Kafka Topics
    runs-on: ubuntu-latest
    needs: [infra, build]

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run kafka-setup ECS task and wait for completion
        run: |
          CLUSTER="${{ needs.infra.outputs.ecs_cluster_arn }}"
          SUBNETS="${{ needs.infra.outputs.private_subnet_ids }}"
          SG="${{ needs.infra.outputs.ecs_security_group_id }}"
          TD="${{ env.PROJECT_NAME }}-kafka-setup"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TD" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Kafka-setup task: $TASK_ARN"
          echo "Waiting for completion (topics already exist on re-runs — that's fine)..."

          # Poll for up to 30 minutes (aws ecs wait times out at 10 min by default)
          MAX_WAIT=1800
          ELAPSED=0
          until [ "$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].lastStatus' --output text)" = "STOPPED" ]; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "Timed out after ${MAX_WAIT}s waiting for kafka-setup task"
              exit 1
            fi
            echo "Still waiting... (${ELAPSED}s elapsed)"
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "Exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Topic creation failed — check CloudWatch Logs Insights: /esp/kafka-setup"
            exit 1
          fi
          echo "Kafka topics are ready"

  # ── Job 4: Force new ECS deployments to pick up the fresh images ─────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [infra, build, kafka-setup]

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force ECS redeploy for all services
        run: |
          CLUSTER="${{ needs.infra.outputs.ecs_cluster_name }}"
          P="${{ env.PROJECT_NAME }}"

          for SVC in ingestor scoring-service correlation-service bff frontend; do
            echo "Redeploying $SVC..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$P-$SVC" \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Print deployment URLs
        run: |
          echo ""
          echo "Deployment triggered. New tasks will start within ~2 minutes."
          echo ""
          echo "  Frontend : ${{ needs.infra.outputs.frontend_url }}"
          echo "  BFF      : ${{ needs.infra.outputs.bff_url }}"
          echo ""
          echo "Monitor: https://${{ env.AWS_REGION }}.console.aws.amazon.com/ecs/v2/clusters/${{ needs.infra.outputs.ecs_cluster_name }}/services"
